<!DOCTYPE html>
<html>
<head>
    <title>Steam ID Extractor & Query</title>
    <link rel="stylesheet" href="CSS & JS/style.css">
</head>


<body>
    <h2>Steam Game Inspector</h2>
    <p>Dán link Steam (VD: https://store.steampowered.com/app/730/...) hoặc nhập ID:</p>
    <input type="text" id="steamInput" style="width: 400px;" placeholder="https://store.steampowered.com/app/730/...">
    <button id="inspectBtn">Inspect Game</button>
    
    <div id="status" style="margin-top: 10px; font-weight: bold;"></div>
    <hr>
    <div id="gameDisplay">
        </div>
    <pre id="rawOutput" style="background: #eee; padding: 10px; font-size: 11px; display: none;"></pre>

    <script src="CSS & JS/script.js"></script>
</body>
</html>
