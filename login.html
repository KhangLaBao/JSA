<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập tài khoản</title>
    <link rel="stylesheet" href="CSS & JS/style.css" />
  </head>
  <body>
    <!-- Auth Menu Bar -->
    <div class="auth-menu">
      <div class="auth-greeting" id="user-greeting">Hi, Guest</div>
      <div class="auth-buttons" id="auth-buttons">
        <a href="login.html" class="auth-btn">Login</a>
        <a href="regis.html" class="auth-btn">Register</a>
      </div>
    </div>

    <div class="main-shell">
      <section class="auth-form-section">
        <div class="auth-form-container">
          <h1>Đăng nhập tài khoản</h1>
          <p class="auth-form-subtitle">Nhập thông tin tài khoản của bạn</p>
          
          <div class="form-group">
            <label for="fname">Tên tài khoản</label>
            <input
              type="text"
              id="fname"
              name="fname"
              placeholder="Nhập tên tài khoản của bạn"
              class="auth-input"
            />
          </div>
          
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Nhập mật khẩu"
              class="auth-input"
            />
          </div>
          
          <button class="action-btn" onclick="handleLogin()" style="width: 100%; margin-top: 16px;">
            Đăng nhập
          </button>
          
          <p class="auth-link-text">
            Chưa có tài khoản? <a href="regis.html" class="auth-link">Đăng kí tại đây</a>
          </p>
        </div>
      </section>
    </div>

    <script>
      function updateAuthMenu() {
        const username = localStorage.getItem('loggedInUser');
        const greeting = document.getElementById('user-greeting');
        const buttons = document.getElementById('auth-buttons');
        
        if (username) {
          greeting.textContent = `Hi, ${username}`;
          buttons.innerHTML = `<button class="auth-btn logout-btn" onclick="handleLogout()">Logout</button>`;
        } else {
          greeting.textContent = 'Hi, Guest';
          buttons.innerHTML = `<a href="login.html" class="auth-btn">Login</a><a href="regis.html" class="auth-btn">Register</a>`;
        }
      }
      
      function handleLogin() {
        const username = document.getElementById('fname').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (!username || !password) {
          alert('Vui lòng nhập tên tài khoản và mật khẩu!');
          return;
        }
        
        localStorage.setItem('loggedInUser', username);
        alert('Đăng nhập thành công!');
        window.location.href = 'index.html';
      }
      
      function handleLogout() {
        localStorage.removeItem('loggedInUser');
        updateAuthMenu();
        alert('Bạn đã đăng xuất');
      }
      
      // Update menu on page load
      window.addEventListener('load', updateAuthMenu);
    </script>
  </body>
</html>
